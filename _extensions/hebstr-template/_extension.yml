title: hebstr-template
author: hebstr
version: 0.9.0
quarto-required: ">=1.7.0"
contributes:
  formats:

    common:
      lang: fr
      number-sections: true
      number-depth: 4
      toc: true
      toc-depth: 4
      colorlinks: true
      default-image_extension: png
      crossref:
        title-delim: "\\."
        tbl-title: "Tableau"
      tbl-cap-location: top
      fig-cap-location: bottom
      callout-appearance: simple
      fig-align: center
      knitr:
        opts_chunk:
          collapse: true
          comment: "#>"
          echo: false
          message: false
          warning: false

    html:
      date: last-modified
      published-title: "dernière mise à jour"
      toc-title: "Sur cette page"
      toc-depth: 4
      toc-expand: true
      code-link: false
      code-fold: true
      code-copy: hover
      html-table-processing: none
      # html-math-method: plain
      theme:
        light: [theme-light.scss, theme-base.scss]
        dark: [theme-dark.scss, theme-base.scss]
      css: resources/fonts.css
      lightbox: true
      grid:
        sidebar-width: 330px
        body-width: 1000px
        margin-width: 380px
        gutter-width: 2rem
      include-in-header:
        - text: '<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">'
        - text: |
            <script>
            window.MathJax = {
              chtml: {
                mtextInheritFont: true
              }
            };
            </script>

    typst:
      font-paths: resources/fonts
      html-table-processing: none
      # html-math-method: plain
      papersize: a4
      margin:
        x: 1.5cm
        y: 1.5cm
      keep-typ: false
      template-partials:
        - resources/typst/numbering.typ
        - resources/typst/page.typ
        - resources/typst/typst-show.typ
      filters:
        - path: resources/typst/orange-book.lua
          at: post-quarto

    docx:
      reference-doc: resources/chazard.dotx
      number-sections: false
